pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{ts,tsx,js,jsx,json,jsonc}"
      run: pnpm biome check --write {staged_files} && git add {staged_files}
    ruff-check:
      root: "apps/wrapper/"
      glob: "*.py"
      run: uv run ruff check --fix {staged_files} && git add {staged_files}
    ruff-format:
      root: "apps/wrapper/"
      glob: "*.py"
      run: uv run ruff format {staged_files} && git add {staged_files}

pre-push:
  commands:
    typecheck:
      run: pnpm turbo typecheck
