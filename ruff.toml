line-length = 100
target-version = "py312"
extend-exclude = [
    "data",
    "data-set",
    "**/node_modules",
    "**/.venv",
    "**/build",
    "**/dist",
]

[lint]
select = ["E", "F", "I", "B", "UP", "SIM", "RUF"]
ignore = [
    "E501",  # line-too-long (formatter handles)
    "B008",  # do not perform function calls in argument defaults
]

[format]
quote-style = "double"
indent-style = "space"
