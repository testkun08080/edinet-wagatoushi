<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>エディスク — オープンソース EDINET スクリーナー</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f3f0;
      --dark: #1a1816;
      --accent: #3a3734;
      --accent-g: #7a7570;
      --accent-b: #b0aca6;
      --text: #1a1816;
      --text2: #78746f;
      --border: #dedad4;
      --card: #ffffff;
      --sidebar: #100e0c;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.6; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    a { text-decoration: none; color: inherit; }
    input, select { font-family: inherit; }

    /* NAV */
    .nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 58px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; transition: background 0.3s, box-shadow 0.3s; }
    .nav.scrolled { background: rgba(247,247,248,0.95); backdrop-filter: blur(10px); box-shadow: 0 1px 0 var(--border); }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { width: 26px; height: 26px; object-fit: contain; transition: filter 0.3s; }
    .nav:not(.scrolled) .nav-logo img { filter: invert(1); }
    .nav-logo-name { font-size: 14px; font-weight: 700; letter-spacing: 0.01em; transition: color 0.3s; }
    .nav:not(.scrolled) .nav-logo-name { color: #fff; }
    .nav-links { display: flex; align-items: center; gap: 36px; }
    .nav-link { font-size: 13px; font-weight: 500; transition: opacity 0.2s; }
    .nav:not(.scrolled) .nav-link { color: rgba(255,255,255,0.7); }
    .nav-link:hover { opacity: 0.55; }
    .nav-gh { padding: 7px 18px; border-radius: 7px; font-size: 13px; font-weight: 600; background: var(--dark); color: #fff; transition: opacity 0.2s; display: flex; align-items: center; gap: 5px; letter-spacing: 0.01em; }
    .nav:not(.scrolled) .nav-gh { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.18); }
    .nav-gh:hover { opacity: 0.78; }

    /* HERO */
    .hero { background: var(--dark); color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 110px 40px 0; position: relative; overflow: hidden; }
    .hero-dots { position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 32px 32px; }
    .hero-glow { position: absolute; top: -10%; left: 50%; transform: translateX(-50%); width: 700px; height: 400px; background: radial-gradient(ellipse, rgba(255,255,255,0.03) 0%, transparent 70%); pointer-events: none; }
    .hero-content { position: relative; z-index: 1; text-align: center; width: 100%; max-width: 860px; }
    .hero-badge { display: inline-flex; align-items: center; gap: 7px; padding: 4px 14px; border: 1px solid rgba(255,255,255,0.2); border-radius: 100px; font-size: 10px; font-weight: 500; color: rgba(255,255,255,0.55); letter-spacing: 0.09em; text-transform: uppercase; margin-bottom: 28px; }
    .hero-badge-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.5); }
    .hero-h1 { font-size: clamp(36px, 5.5vw, 66px); font-weight: 700; line-height: 1.18; letter-spacing: -0.025em; margin-bottom: 22px; text-wrap: pretty; }
    .hero-h1 em { font-style: normal; color: #ffffff; font-weight: 300; letter-spacing: -0.03em; }
    .hero-sub { font-size: 16px; color: rgba(255,255,255,0.55); max-width: 520px; margin: 0 auto 40px; line-height: 1.85; font-weight: 300; }
    .hero-ctas { display: flex; gap: 12px; justify-content: center; margin-bottom: 72px; }
    .btn-p { padding: 12px 30px; background: #ffffff; color: var(--dark); border-radius: 8px; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; transition: opacity 0.2s; letter-spacing: 0.01em; }
    .btn-p:hover { opacity: 0.83; }
    .btn-s { padding: 12px 28px; background: rgba(255,255,255,0.08); color: #fff; border-radius: 8px; font-size: 14px; font-weight: 500; border: 1px solid rgba(255,255,255,0.16); display: flex; align-items: center; gap: 6px; transition: background 0.2s; }
    .btn-s:hover { background: rgba(255,255,255,0.13); }

    /* APP MOCKUP */
    .mockup-wrap { width: 100%; max-width: 860px; margin: 0 auto; position: relative; padding-bottom: 0; }
    .mockup-shadow { transform: perspective(1600px) rotateX(5deg); transform-origin: top center; border-radius: 12px 12px 0 0; overflow: hidden; box-shadow: 0 32px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.08); }
    .mockup-bar { background: #dadada; height: 34px; display: flex; align-items: center; padding: 0 12px; gap: 6px; flex-shrink: 0; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .mockup-url-bar { flex: 1; margin: 0 8px; background: rgba(255,255,255,0.65); border-radius: 4px; height: 19px; display: flex; align-items: center; padding: 0 10px; font-size: 9.5px; font-family: 'DM Mono', monospace; color: #555; }
    .mockup-body { display: flex; height: 400px; background: #fff; }
    .m-sidebar { width: 148px; background: var(--sidebar); flex-shrink: 0; display: flex; flex-direction: column; padding: 14px 0; }
    .m-logo-area { padding: 0 14px 12px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-bottom: 10px; display: flex; align-items: center; gap: 7px; }
    .m-logo-area img { width: 20px; height: 20px; filter: invert(1); opacity: 0.85; }
    .m-logo-text { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.9); line-height: 1.2; }
    .m-logo-sub { font-size: 7.5px; color: rgba(255,255,255,0.3); }
    .m-nav-section { font-size: 7px; font-weight: 600; color: rgba(255,255,255,0.25); letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 14px 4px; }
    .m-nav-item { display: flex; align-items: center; gap: 7px; padding: 6px 14px; font-size: 10px; color: rgba(255,255,255,0.42); cursor: pointer; transition: color 0.15s; }
    .m-nav-item.active { color: rgba(255,255,255,0.88); background: rgba(255,255,255,0.06); }
    .m-nav-item svg { flex-shrink: 0; }
    .m-history-item { padding: 5px 14px 5px 35px; font-size: 9px; color: rgba(255,255,255,0.3); display: flex; justify-content: space-between; }
    .m-main { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    .m-topbar { background: #fafafa; border-bottom: 1px solid #f0f0f0; padding: 8px 18px; font-size: 10px; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
    .m-topbar-title { font-size: 11px; font-weight: 600; color: #555; }
    .m-header { padding: 14px 18px 0; border-bottom: 1px solid #f0f0f0; }
    .m-company { font-size: 20px; font-weight: 700; color: #191919; letter-spacing: -0.02em; }
    .m-company-sub { font-size: 9px; color: #bbb; margin-top: 1px; margin-bottom: 8px; }
    .m-tabs { display: flex; gap: 0; overflow: hidden; }
    .m-tab { padding: 7px 12px; font-size: 9px; color: #aaa; border-bottom: 2px solid transparent; white-space: nowrap; }
    .m-tab.active { color: #191919; border-bottom-color: #191919; font-weight: 600; }
    .m-content { padding: 12px 18px; flex: 1; overflow: hidden; }
    .m-period-row { display: flex; gap: 0; margin-bottom: 10px; }
    .m-period-btn { padding: 3px 8px; font-size: 8px; border: 1px solid #e5e7eb; background: #fff; color: #aaa; border-right: none; }
    .m-period-btn:first-child { border-radius: 4px 0 0 4px; }
    .m-period-btn:last-child { border-right: 1px solid #e5e7eb; border-radius: 0 4px 4px 0; }
    .m-period-btn.active { background: #191919; color: #fff; border-color: #191919; }
    .m-chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .m-chart-card { border: 1px solid #f0f0f0; border-radius: 6px; padding: 9px 10px; }
    .m-chart-title { font-size: 8.5px; font-weight: 700; color: #191919; margin-bottom: 2px; }
    .m-chart-sub { font-size: 7px; color: #ccc; margin-bottom: 6px; }
    .m-metrics-row { display: flex; border: 1px solid #f0f0f0; border-radius: 6px; overflow: hidden; }
    .m-metric { flex: 1; padding: 8px 12px; border-right: 1px solid #f0f0f0; }
    .m-metric:last-child { border-right: none; }
    .m-metric-l { font-size: 7px; color: #bbb; margin-bottom: 2px; }
    .m-metric-v { font-size: 13px; font-weight: 700; color: #191919; font-family: 'DM Mono', monospace; }

    /* STATS */
    .stats { background: var(--dark); }
    .stats-inner { max-width: 900px; margin: 0 auto; display: flex; }
    .stat { flex: 1; padding: 36px 20px; text-align: center; border-right: 1px solid rgba(255,255,255,0.06); }
    .stat:last-child { border-right: none; }
    .stat-val { font-size: 38px; font-weight: 700; color: #fff; font-family: 'DM Mono', monospace; line-height: 1; margin-bottom: 7px; letter-spacing: -0.02em; }
    .stat-val span { color: rgba(255,255,255,0.45); font-weight: 300; }
    .stat-label { font-size: 11px; color: rgba(255,255,255,0.38); }

    /* SECTIONS */
    .section { padding: 96px 48px; }
    .section-inner { max-width: 900px; margin: 0 auto; }
    .s-tag { font-size: 10.5px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 12px; }
    .s-h2 { font-size: clamp(26px, 3.2vw, 40px); font-weight: 700; letter-spacing: -0.022em; line-height: 1.22; margin-bottom: 14px; text-wrap: pretty; }
    .s-sub { font-size: 15px; color: var(--text2); max-width: 520px; line-height: 1.82; margin-bottom: 52px; font-weight: 300; }

    /* FEATURES */
    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
    .feat-card { background: var(--card); padding: 32px 26px; transition: background 0.15s; }
    .feat-card:hover { background: #fafafa; }
    .feat-num { font-size: 10px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text2); margin-bottom: 18px; letter-spacing: 0.05em; }
    .feat-title { font-size: 14.5px; font-weight: 700; margin-bottom: 9px; letter-spacing: -0.01em; line-height: 1.3; }
    .feat-desc { font-size: 12.5px; color: var(--text2); line-height: 1.75; }

    /* SCREENER DEMO */
    .demo-section { background: #eeeae4; padding: 96px 48px; }
    .demo-inner { max-width: 960px; margin: 0 auto; }
    .demo-controls { background: var(--card); border: 1px solid var(--border); border-radius: 10px 10px 0 0; padding: 18px 22px; display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; border-bottom: none; }
    .filter-group { display: flex; flex-direction: column; gap: 6px; }
    .filter-label { font-size: 9.5px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; }
    .filter-row { display: flex; align-items: center; gap: 6px; }
    .filter-input { width: 72px; padding: 6px 9px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-family: 'DM Mono', monospace; background: var(--bg); outline: none; color: var(--text); transition: border-color 0.15s; }
    .filter-input:focus { border-color: var(--accent); }
    .filter-unit { font-size: 11.5px; color: var(--text2); }
    .filter-select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; background: var(--bg); outline: none; color: var(--text); transition: border-color 0.15s; }
    .filter-select:focus { border-color: var(--accent); }
    .filter-reset { padding: 6px 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--text2); background: var(--bg); transition: all 0.15s; align-self: flex-end; }
    .filter-reset:hover { border-color: var(--text2); color: var(--text); }
    .demo-table-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 0 0 10px 10px; overflow: hidden; }
    .results-bar { padding: 10px 20px; border-bottom: 1px solid var(--border); font-size: 11.5px; color: var(--text2); display: flex; align-items: center; gap: 6px; background: #f8f6f3; }
    .results-bar strong { color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; }
    .demo-table { width: 100%; border-collapse: collapse; }
    .demo-table th { padding: 9px 16px; font-size: 10px; font-weight: 700; text-align: left; color: var(--text2); background: #fafafa; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; }
    .demo-table th:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) { text-align: right; }
    .demo-table td { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid #f5f5f6; }
    .demo-table td:not(:first-child):not(:nth-child(2)):not(:nth-child(3)) { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; }
    .demo-table tr:last-child td { border-bottom: none; }
    .demo-table tr:hover td { background: #fafbff; }
    .t-code { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2); font-weight: 400; }
    .t-name { font-weight: 600; font-size: 13px; }
    .t-sector { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 500; background: #f3f4f6; color: #4b5563; }
    .t-pos { color: var(--dark); font-weight: 600; } .t-neg { color: var(--text2); }
    .no-results { text-align: center; padding: 52px; color: var(--text2); font-size: 14px; }

    /* OPEN SOURCE */
    .oss { background: var(--dark); color: #fff; padding: 100px 48px; text-align: center; }
    .oss-inner { max-width: 620px; margin: 0 auto; }
    .oss-badge { display: inline-flex; align-items: center; gap: 7px; padding: 4px 14px; border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; font-size: 10px; color: rgba(255,255,255,0.38); letter-spacing: 0.1em; margin-bottom: 26px; }
    .oss-h2 { font-size: clamp(28px, 4vw, 46px); font-weight: 700; letter-spacing: -0.025em; line-height: 1.2; margin-bottom: 18px; text-wrap: pretty; }
    .oss-h2 em { font-style: normal; color: rgba(255,255,255,0.55); font-weight: 300; }
    .oss-desc { font-size: 15px; color: rgba(255,255,255,0.45); line-height: 1.85; margin-bottom: 42px; font-weight: 300; }
    .oss-ctas { display: flex; justify-content: center; gap: 12px; }
    .oss-stats-row { display: flex; justify-content: center; gap: 0; margin-top: 64px; padding-top: 48px; border-top: 1px solid rgba(255,255,255,0.07); }
    .oss-stat { flex: 1; max-width: 150px; }
    .oss-stat-v { font-size: 26px; font-weight: 700; font-family: 'DM Mono', monospace; color: #fff; letter-spacing: -0.02em; }
    .oss-stat-l { font-size: 10.5px; color: rgba(255,255,255,0.35); margin-top: 5px; }

    /* STACK STRIP */
    .stack-strip { background: rgba(255,255,255,0.04); border-top: 1px solid rgba(255,255,255,0.06); padding: 28px 48px; }
    .stack-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
    .stack-label { font-size: 11px; color: rgba(255,255,255,0.25); margin-right: 8px; white-space: nowrap; }
    .stack-item { padding: 4px 12px; border: 1px solid rgba(255,255,255,0.1); border-radius: 100px; font-size: 11px; color: rgba(255,255,255,0.45); font-family: 'DM Mono', monospace; white-space: nowrap; }

    /* FOOTER */
    .footer { background: var(--dark); border-top: 1px solid rgba(255,255,255,0.06); padding: 28px 48px; }
    .footer-inner { max-width: 900px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; }
    .footer-logo { display: flex; align-items: center; gap: 8px; }
    .footer-logo img { width: 18px; height: 18px; filter: invert(1); opacity: 0.4; }
    .footer-logo span { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.3); }
    .footer-links { display: flex; gap: 24px; }
    .footer-link { font-size: 12px; color: rgba(255,255,255,0.27); transition: color 0.15s; }
    .footer-link:hover { color: rgba(255,255,255,0.6); }
    .footer-copy { font-size: 11px; color: rgba(255,255,255,0.18); }

    /* TWEAKS */
    .tweaks-panel { position: fixed; bottom: 24px; right: 24px; z-index: 9999; background: #fff; border: 1px solid var(--border); border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.14); padding: 20px; width: 240px; display: none; }
    .tweaks-panel.visible { display: block; }
    .tweaks-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 16px; letter-spacing: 0.02em; }
    .tweak-row { margin-bottom: 14px; }
    .tweak-row-label { font-size: 10px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 7px; }
    .tweak-swatches { display: flex; gap: 8px; }
    .swatch { width: 26px; height: 26px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
    .swatch.active { border-color: var(--text); transform: scale(1.1); }
    .tweak-options { display: flex; gap: 6px; flex-wrap: wrap; }
    .tweak-opt { padding: 5px 11px; border: 1px solid var(--border); border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.15s; color: var(--text2); }
    .tweak-opt.active { border-color: var(--text); color: var(--text); font-weight: 600; background: #f7f7f8; }
    .tweaks-close { position: absolute; top: 14px; right: 14px; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--text2); font-size: 14px; border-radius: 4px; }
    .tweaks-close:hover { background: var(--bg); }
  </style>
</head>

<script type="text/babel">

/* ── HELPERS ── */
const fmt = (n) => n == null ? '—' : n.toFixed(2);

function toPoints(data, w, h, padY = 3) {
  const mx = Math.max(...data), mn = Math.min(...data);
  const r = mx - mn || 1;
  return data.map((v, i) => {
    const x = (i / (data.length - 1)) * w;
    const y = h - padY - ((v - mn) / r) * (h - padY * 2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
}

/* ── SPARKLINE ── */
const Sparkline = ({ data, color = '#d96c2a', w = 190, h = 48 }) => {
  const pts = toPoints(data, w, h);
  const area = `0,${h} ${pts} ${w},${h}`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block',overflow:'visible'}}>
      <defs>
        <linearGradient id={`g${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.2" />
          <stop offset="100%" stopColor={color} stopOpacity="0.01" />
        </linearGradient>
      </defs>
      <polygon points={area} fill={`url(#g${color.replace('#','')})`} />
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
    </svg>
  );
};

const MultiSparkline = ({ series, colors, w = 190, h = 48 }) => {
  const all = series.flatMap(s => s);
  const mx = Math.max(...all), mn = Math.min(...all), r = mx - mn || 1;
  const pts = (data) => data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-3-((v-mn)/r)*(h-6);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}>
      {series.map((d,i)=>(
        <polyline key={i} points={pts(d)} fill="none" stroke={colors[i]} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
      ))}
    </svg>
  );
};

/* ── useCountUp ── */
function useCountUp(target, duration = 1600) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const t0 = Date.now();
        const tick = () => {
          const p = Math.min((Date.now() - t0) / duration, 1);
          const ease = 1 - Math.pow(1 - p, 3);
          setVal(Math.round(ease * target));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.5 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [target, duration]);
  return [val, ref];
}

  ];
  return (
    <div className={`tweaks-panel${visible ? ' visible' : ''}`}>
      <div className="tweaks-title">Tweaks</div>
      <button className="tweaks-close" onClick={onClose}>✕</button>
      <div className="tweak-row">
        <div className="tweak-row-label">アクセントカラー</div>
        <div className="tweak-swatches">
          {COLORS.map(c => (
            <div key={c.v} className={`swatch${tweaks.accentColor===c.v?' active':''}`}
              style={{background:c.v}}
              title={c.label}
              onClick={()=>setTweak('accentColor',c.v)}
            />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-row-label">ヒーローモックアップ</div>
        <div className="tweak-options">
          {['モックアップあり','テキストのみ'].map(o=>(
            <div key={o} className={`tweak-opt${tweaks.heroStyle===o?' active':''}`} onClick={()=>setTweak('heroStyle',o)}>{o}</div>
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-row-label">スクリーナー行数</div>
        <div className="tweak-options">
          {['5行','10行','全て'].map(o=>(
            <div key={o} className={`tweak-opt${tweaks.tableRows===o?' active':''}`} onClick={()=>setTweak('tableRows',o)}>{o}</div>
          ))}
        </div>
      </div>
    </div>
  );
};

/* ── APP ── */
const App = () => {
  const [tweaks, setTweaksState] = useState(TWEAK_DEFAULTS);
  const [tweaksVisible, setTweaksVisible] = useState(false);

  const setTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaksState(next);
    document.documentElement.style.setProperty('--accent', next.accentColor);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
  };

  useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const handleClosePanel = () => {
    setTweaksVisible(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  return (
    <>
      <Nav accentColor={tweaks.accentColor} />
      <Hero showMockup={tweaks.heroStyle !== 'テキストのみ'} />
      <Stats />
      <Features />
      <ScreenerDemo />
      <OpenSource />
      <Footer />
      <TweaksPanel
        visible={tweaksVisible}
        onClose={handleClosePanel}
        tweaks={tweaks}
        setTweak={setTweak}
      />
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
