name: Screener daily refresh

on:
  workflow_dispatch:
    inputs:
      data_scope:
        description: "データ生成モード"
        required: true
        default: "full"
        type: choice
        options:
          - sample
          - full
      data_source:
        description: "データソース(dataset|d1|hybrid)"
        required: false
        default: "d1"
        type: choice
        options:
          - dataset
          - d1
          - hybrid
      force_dataset_download:
        description: "既存 data-set があっても再取得する"
        required: false
        default: false
        type: boolean
      d1_environment:
        description: "D1 environment for manual runs"
        required: false
        default: "staging"
        type: choice
        options:
          - staging
          - production
  schedule:
    # 毎日 05:10 JST（UTC 20:10）
    - cron: "10 20 * * *"

env:
  UV_COMPILE_BYTECODE: 0
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: edinet-screener/package-lock.json

      - name: Install wrapper dependencies
        working-directory: edinet-wrapper
        run: uv sync

      - name: Install frontend dependencies
        working-directory: edinet-screener
        run: npm ci

      - name: Resolve run parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_SCOPE: ${{ inputs.data_scope }}
          INPUT_SOURCE: ${{ inputs.data_source }}
          INPUT_FORCE_DOWNLOAD: ${{ inputs.force_dataset_download }}
          INPUT_D1_ENVIRONMENT: ${{ inputs.d1_environment }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            SCOPE="${INPUT_SCOPE:-full}"
            SOURCE="${INPUT_SOURCE:-d1}"
            FORCE_DL="${INPUT_FORCE_DOWNLOAD:-false}"
            D1_ENVIRONMENT="${INPUT_D1_ENVIRONMENT:-staging}"
          else
            SCOPE="full"
            SOURCE="d1"
            FORCE_DL="false"
            D1_ENVIRONMENT="production"
          fi
          echo "scope=$SCOPE" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "force_download=$FORCE_DL" >> "$GITHUB_OUTPUT"
          echo "d1_environment=$D1_ENVIRONMENT" >> "$GITHUB_OUTPUT"

      - name: Preserve previous public data metrics
        working-directory: edinet-screener
        run: |
          set -euo pipefail
          mkdir -p ../edinet-wrapper/state
          if [ -f public/data/company_metrics.json ]; then
            cp public/data/company_metrics.json ../edinet-wrapper/state/previous_company_metrics.json
          fi

      - name: Prepare D1 snapshot locally
        if: ${{ steps.params.outputs.source == 'd1' || steps.params.outputs.source == 'hybrid' }}
        working-directory: edinet-screener
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_ENVIRONMENT: ${{ steps.params.outputs.d1_environment }}
        run: |
          set -euo pipefail
          mkdir -p ../edinet-wrapper/state
          bash scripts/d1-apply-schema.sh "$D1_ENVIRONMENT"
          wrangler d1 export EDINET_DB \
            --env "$D1_ENVIRONMENT" \
            --remote \
            --no-schema \
            --output ../edinet-wrapper/state/d1-export.sql
          cd ../edinet-wrapper
          uv run python scripts/pipeline/load_sql_dump_to_sqlite.py \
            --sql_path state/d1-export.sql \
            --db_path state/edinet_pipeline.db \
            --schema_path sql/d1_schema.sql \
            --reset

      - name: Ingest daily EDINET into D1-compatible DB
        if: ${{ steps.params.outputs.source == 'd1' || steps.params.outputs.source == 'hybrid' }}
        working-directory: edinet-wrapper
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_REQUEST_DELAY: "3"
        run: |
          set -euo pipefail
          uv run python scripts/pipeline/ingest_daily_edinet_to_db.py \
            --doc_types "annual,quarterly,semiannual,large_holding" \
            --db_path state/edinet_pipeline.db \
            --schema_path sql/d1_schema.sql \
            --raw_root raw \
            --scope daily-refresh \
            --touched_doc_ids_out state/touched_doc_ids.txt
          uv run python scripts/pipeline/materialize_daily_aggregates.py --db_path state/edinet_pipeline.db
          uv run python scripts/pipeline/check_daily_delta.py --db_path state/edinet_pipeline.db --max_drop_ratio 0.7

      - name: Persist daily delta to Cloudflare D1
        if: ${{ steps.params.outputs.source == 'd1' || steps.params.outputs.source == 'hybrid' }}
        working-directory: edinet-wrapper
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_ENVIRONMENT: ${{ steps.params.outputs.d1_environment }}
        run: |
          set -euo pipefail
          rm -rf state/d1-delta-sql
          uv run python scripts/pipeline/export_db_to_d1_sql.py \
            --db_path state/edinet_pipeline.db \
            --output_dir state/d1-delta-sql \
            --where_doc_ids_file state/touched_doc_ids.txt \
            --chunk_rows 50
          cd ../edinet-screener
          bash scripts/d1-execute-sql-dir.sh "$D1_ENVIRONMENT" ../edinet-wrapper/state/d1-delta-sql

      - name: Build screener data
        working-directory: edinet-screener
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          DATA_SET_URL: ${{ secrets.DATA_SET_URL }}
          DATA_SCOPE: ${{ steps.params.outputs.scope }}
          DATA_SOURCE: ${{ steps.params.outputs.source }}
          D1_DB_PATH: ../edinet-wrapper/state/edinet_pipeline.db
          FORCE_DOWNLOAD: ${{ steps.params.outputs.force_download == 'true' && '1' || '0' }}
        run: npm run generate-data

      - name: Hybrid compatibility check (dataset vs d1)
        if: ${{ steps.params.outputs.source == 'hybrid' }}
        working-directory: edinet-wrapper
        run: |
          set -euo pipefail
          if [ ! -d "../data-set" ]; then
            echo "No data-set found. Skip compatibility check."
            exit 0
          fi
          TMP_BASELINE="$(mktemp -d)"
          uv run python scripts/frontend/build_screener_data.py \
            --mode "${{ steps.params.outputs.scope }}" \
            --data_set ../data-set \
            --output "$TMP_BASELINE"
          uv run python scripts/pipeline/compare_public_data_outputs.py \
            --baseline "$TMP_BASELINE" \
            --candidate ../edinet-screener/public/data \
            --max_missing_ratio 0.10

      - name: Validate generated data quality
        working-directory: edinet-screener
        run: |
          set -euo pipefail
          test -f public/data/company_metrics.json
          test -f public/data/companies.json
          test -d public/data/summaries
          cd ../edinet-wrapper
          uv run python scripts/pipeline/validate_public_data.py \
            --public_data ../edinet-screener/public/data \
            --previous_metrics state/previous_company_metrics.json \
            --max_drop_ratio 0.1

      - name: Test build frontend
        working-directory: edinet-screener
        run: npm run build:app

      - name: Commit and push generated data
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git add edinet-screener/public/data
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): refresh screener data (${{ steps.params.outputs.scope }})"
          git push origin "HEAD:${BRANCH}"

      - name: Write run summary
        if: always()
        working-directory: edinet-screener
        run: |
          {
            echo "## Screener refresh result"
            echo "- Scope: \`${{ steps.params.outputs.scope }}\`"
            echo "- Source: \`${{ steps.params.outputs.source }}\`"
            echo "- D1 environment: \`${{ steps.params.outputs.d1_environment }}\`"
            echo "- Force download: \`${{ steps.params.outputs.force_download }}\`"
            echo "- Delivery: \`commit/push (Cloudflare Git integration)\`"
            if [ -f public/data/company_metrics.json ]; then
              python3 <<'PY'
          import json, pathlib
          p = pathlib.Path("public/data/company_metrics.json")
          data = json.loads(p.read_text(encoding="utf-8"))
          metrics = data.get("metrics", [])
          print(f"- metrics rows: `{len(metrics)}`")
          PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"
