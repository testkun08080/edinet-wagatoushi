# 一括起動: 指定した年範囲 × 書類種別（複数）の組み合わせで EDINET Corpus を起動する
# 1 本の corpus が完了してから次を dispatch（順次実行）
name: EDINET Corpus (バッチ/順次実行)

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "開始年"
        required: true
        default: "2019"
        type: string
      end_year:
        description: "終了年（この年を含む）"
        required: true
        default: "2024"
        type: string
      doc_types:
        description: "書類種別（カンマ区切り 例: quarterly,semiannual, annual または large_holding）"
        required: true
        default: "quarterly"
        type: string
      months:
        description: "月（カンマ or 範囲 例: 9-12）。未指定で全12ヶ月"
        required: false
        type: string
      chunk_days:
        description: "月内分割日数（edinet_corpus と同じ。例: 7）。空または 0 で月1ジョブ"
        required: false
        default: "0"
        type: string
      wait_for_completion:
        description: "各 corpus 完了を待ってから次を発行（推奨: true）"
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  actions: write # 他ワークフローを workflow_dispatch で起動するため

jobs:
  dispatch:
    name: Dispatch corpus workflows (sequential)
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EDINET Corpus for each (year × doc_type), wait for completion between runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          REF: ${{ github.ref_name }}
          WAIT: ${{ inputs.wait_for_completion }}
        run: |
          set -e
          START="${{ inputs.start_year }}"
          END="${{ inputs.end_year }}"
          DOC_TYPES="${{ inputs.doc_types }}"
          MONTHS="${{ inputs.months }}"
          CHUNK_DAYS="${{ inputs.chunk_days }}"
          API="https://api.github.com/repos/$REPO"

          wait_run() {
            local run_id=$1
            local poll_interval=60
            local max_wait=21600  # 6時間
            local waited=0
            while [ "$waited" -lt "$max_wait" ]; do
              st=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" "$API/actions/runs/$run_id" | jq -r '.status')
              echo "  Run $run_id status: $st"
              [ "$st" = "completed" ] && return 0
              sleep "$poll_interval"
              waited=$((waited + poll_interval))
            done
            echo "  Timeout waiting for run $run_id" >&2
            return 1
          }

          for year in $(seq "$START" "$END"); do
            for doc_type in $(echo "$DOC_TYPES" | tr ',' ' '); do
              doc_type=$(echo "$doc_type" | xargs)
              [ -z "$doc_type" ] && continue
              echo "=== Dispatching: year=$year doc_type=$doc_type months=${MONTHS:-all} chunk_days=${CHUNK_DAYS:-0} ==="
              if [ -n "$MONTHS" ] && [ -n "$CHUNK_DAYS" ] && [ "$CHUNK_DAYS" != "0" ]; then
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  --arg months "$MONTHS" \
                  --arg chunk_days "$CHUNK_DAYS" \
                  '{doc_type: $doc_type, year: $year, months: $months, chunk_days: $chunk_days}')
              elif [ -n "$MONTHS" ]; then
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  --arg months "$MONTHS" \
                  '{doc_type: $doc_type, year: $year, months: $months}')
              elif [ -n "$CHUNK_DAYS" ] && [ "$CHUNK_DAYS" != "0" ]; then
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  --arg chunk_days "$CHUNK_DAYS" \
                  '{doc_type: $doc_type, year: $year, chunk_days: $chunk_days}')
              else
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  '{doc_type: $doc_type, year: $year}')
              fi
              curl -sS -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GH_TOKEN" \
                "$API/actions/workflows/edinet_corpus.yml/dispatches" \
                -d "{\"ref\":\"$REF\",\"inputs\":$inputs}"

              if [ "$WAIT" = "true" ]; then
                echo "Waiting for workflow run to appear..."
                sleep 10
                run_id=$(curl -sS -H "Authorization: Bearer $GH_TOKEN" \
                  "$API/actions/workflows/edinet_corpus.yml/runs?per_page=1&branch=$REF" \
                  | jq -r '.workflow_runs[0].id')
                if [ -n "$run_id" ] && [ "$run_id" != "null" ]; then
                  echo "Waiting for run $run_id to complete (poll every 60s, max 6h)..."
                  wait_run "$run_id" || true
                else
                  echo "Could not get run id; waiting 5min before next dispatch."
                  sleep 300
                fi
              else
                sleep 5
              fi
            done
          done
          echo "Done. Check Actions tab for triggered workflows."
