# 一括起動: 指定した年範囲 × 書類種別（複数）の組み合わせで EDINET Corpus を起動する
name: EDINET Corpus (Batch)

on:
  workflow_dispatch:
    inputs:
      start_year:
        description: "開始年"
        required: true
        default: "2019"
        type: string
      end_year:
        description: "終了年（この年を含む）"
        required: true
        default: "2024"
        type: string
      doc_types:
        description: "書類種別（カンマ区切り 例: quarterly,annual または large_holding）"
        required: true
        default: "quarterly"
        type: string
      months:
        description: "月（カンマ or 範囲 例: 9-12）。未指定で全12ヶ月"
        required: false
        type: string

permissions:
  contents: read
  actions: write  # 他ワークフローを workflow_dispatch で起動するため

jobs:
  dispatch:
    name: Dispatch corpus workflows
    runs-on: ubuntu-latest
    steps:
      - name: Trigger EDINET Corpus for each (year × doc_type)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          START=${{ inputs.start_year }}
          END=${{ inputs.end_year }}
          DOC_TYPES="${{ inputs.doc_types }}"
          MONTHS="${{ inputs.months }}"

          for year in $(seq "$START" "$END"); do
            for doc_type in $(echo "$DOC_TYPES" | tr ',' ' '); do
              doc_type=$(echo "$doc_type" | xargs)
              [ -z "$doc_type" ] && continue
              echo "Dispatching: year=$year doc_type=$doc_type months=${MONTHS:-all}"
              if [ -n "$MONTHS" ]; then
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  --arg months "$MONTHS" \
                  '{doc_type: $doc_type, year: $year, months: $months}')
              else
                inputs=$(jq -n \
                  --arg doc_type "$doc_type" \
                  --arg year "$year" \
                  '{doc_type: $doc_type, year: $year}')
              fi
              curl -sS -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/${{ github.repository }}/actions/workflows/edinet_corpus.yml/dispatches" \
                -d "{\"ref\":\"${{ github.ref_name }}\",\"inputs\":$inputs}"
              sleep 1
            done
          done
          echo "Done. Check Actions tab for triggered workflows."
