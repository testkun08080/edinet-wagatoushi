# download_company_10years.py を手動実行（企業別・過去 N 年）
# EDINET Corpus と同様、暦年マトリックス + max-parallel: 1 で順次実行しジョブ単位の 6h 制限内に収める
name: EDINET Download Company (10y)

run-name: EDINET company 10y · ${{ inputs.file_type }} · ${{ inputs.years }}y (run ${{ github.run_number }})

on:
  workflow_dispatch:
    inputs:
      edinet_code:
        description: "【上3つはどれか1つ以上必須】単一 EDINET コード（例: E02367）。他フィールドと併用するとスクリプトはコードをマージします"
        required: false
        default: ""
        type: string
      edinet_codes:
        description: "【必須は上3つのいずれか】複数コード（スペース区切り、例: E00004 E03606）"
        required: false
        default: ""
        type: string
      companies_json:
        description: "【必須は上3つのいずれか】edinetCode を含む JSON のパス（edinet-wrapper からの相対）。手早い試行: scripts/frontend/sample_companies.json"
        required: false
        default: ""
        type: string
      output_dir:
        description: "出力ディレクトリ（--output_dir、edinet-wrapper からの相対）"
        required: false
        default: "data"
        type: string
      file_type:
        description: "ファイル種別（--file_type）"
        required: true
        default: "tsv"
        type: choice
        options:
          - tsv
          - pdf
          - xbrl
      years:
        description: "取得する年数（暦年の本数。今年を含む直近 N 年をマトリックス分割）"
        required: true
        default: 10
        type: number
      doc_types:
        description: "書類種別（カンマまたはスペース区切り。未指定時はスクリプト既定＝全8種）"
        required: false
        default: "annual,quarterly,semiannual,large_holding"
        type: string
      force:
        description: "既存ファイルがあっても再ダウンロード（--force）"
        required: false
        default: false
        type: boolean
      request_delay:
        description: "EDINET API リクエスト間隔（秒）。未指定時は 3"
        required: false
        default: "3"
        type: string

env:
  UV_COMPILE_BYTECODE: 0
  # Node 20 廃止に先立ち、JS 製アクションを Node 24 で実行（https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/）
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    name: prepare years
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        env:
          EDINET_CODE: ${{ inputs.edinet_code }}
          EDINET_CODES: ${{ inputs.edinet_codes }}
          COMPANIES_JSON: ${{ inputs.companies_json }}
        run: |
          c1=$(echo -n "$EDINET_CODE" | tr -d '[:space:]')
          c2=$(echo -n "$EDINET_CODES" | tr -d '[:space:]')
          c3=$(echo -n "$COMPANIES_JSON" | tr -d '[:space:]')
          if [ -z "$c1" ] && [ -z "$c2" ] && [ -z "$c3" ]; then
            echo "::error::edinet_code / edinet_codes / companies_json のいずれかを指定してください（スクリプトと同じ要件です）"
            echo "::notice::Workflow の「Run workflow」フォームで、例: edinet_code=E02144、または companies_json=scripts/frontend/sample_companies.json を入力して再実行してください。"
            exit 1
          fi

      - name: Build calendar year list (today.year − N + 1 … today.year)
        id: years
        run: |
          json=$(python3 -c "
          import json
          from datetime import date
          n = int('${{ inputs.years }}')
          if n < 1:
              raise SystemExit('years must be >= 1')
          end = date.today().year
          start = end - n + 1
          print(json.dumps(list(range(start, end + 1))))
          ")
          echo "json=$json" >> "$GITHUB_OUTPUT"

  download:
    name: "download ${{ matrix.year }}"
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        year: ${{ fromJson(needs.prepare.outputs.years_json) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: edinet-wrapper
        run: uv sync

      - name: Run download_company_10years.py (one calendar year)
        working-directory: edinet-wrapper
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
          EDINET_REQUEST_DELAY: ${{ inputs.request_delay || '3' }}
          EDINET_CODE: ${{ inputs.edinet_code }}
          EDINET_CODES: ${{ inputs.edinet_codes }}
          COMPANIES_JSON: ${{ inputs.companies_json }}
          OUTPUT_DIR: ${{ inputs.output_dir }}
          FILE_TYPE: ${{ inputs.file_type }}
          MATRIX_YEAR: ${{ matrix.year }}
          DOC_TYPES_INPUT: ${{ inputs.doc_types }}
          FORCE_FLAG: ${{ inputs.force }}
        run: |
          set -euo pipefail
          cmd=(uv run python scripts/download/download_company_10years.py)
          cmd+=(--output_dir "$OUTPUT_DIR")
          cmd+=(--file_type "$FILE_TYPE")
          cmd+=(--year "$MATRIX_YEAR")

          # --doc_types（カンマ→スペース。空なら引数省略＝スクリプト既定で全8種）
          dt_trim=$(echo -n "$DOC_TYPES_INPUT" | tr -d '[:space:],')
          if [ -n "$dt_trim" ]; then
            dt="${DOC_TYPES_INPUT//,/ }"
            read -r -a doc_type_arr <<< "$dt"
            if [ "${#doc_type_arr[@]}" -eq 0 ]; then
              echo "::error::doc_types を解釈できませんでした"
              exit 1
            fi
            cmd+=(--doc_types "${doc_type_arr[@]}")
          fi

          ec_trim=$(echo -n "$EDINET_CODE" | tr -d '[:space:]')
          if [ -n "$ec_trim" ]; then
            cmd+=(--edinet_code "$ec_trim")
          fi

          ecs_trim=$(echo -n "$EDINET_CODES" | tr -d '[:space:]')
          if [ -n "$ecs_trim" ]; then
            read -r -a codes_arr <<< "$EDINET_CODES"
            cmd+=(--edinet_codes "${codes_arr[@]}")
          fi

          cj_trim=$(echo -n "$COMPANIES_JSON" | tr -d '[:space:]')
          if [ -n "$cj_trim" ]; then
            cmd+=(--companies_json "$COMPANIES_JSON")
          fi

          if [ "$FORCE_FLAG" = "true" ]; then
            cmd+=(--force)
          fi

          echo "Running: ${cmd[*]}"
          "${cmd[@]}"

      - name: Upload partial artifact (per year)
        if: success()
        uses: actions/upload-artifact@v7
        with:
          # run_attempt の edinet-company-{run}-{attempt} とパターン衝突しないよう yr を付与
          name: edinet-company-yr-${{ github.run_id }}-${{ matrix.year }}
          path: edinet-wrapper/${{ inputs.output_dir || 'data' }}
          retention-days: 7

  merge:
    name: merge artifacts + metadata
    needs: download
    if: success()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download all year artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: edinet-company-yr-${{ github.run_id }}-*
          merge-multiple: true
          path: merged

      - name: Merge metadata_YYYY.json → metadata.json
        env:
          OUT_SUB: ${{ inputs.output_dir || 'data' }}
        run: |
          set -euo pipefail
          root="merged/edinet-wrapper/$OUT_SUB"
          if [ ! -d "$root" ]; then
            echo "::error::Expected directory not found: $root"
            exit 1
          fi
          python3 edinet-wrapper/scripts/download/merge_company_metadata.py "$root"

      - name: Upload combined download artifact
        uses: actions/upload-artifact@v7
        with:
          name: edinet-company-${{ github.run_id }}-${{ github.run_attempt }}
          path: merged/edinet-wrapper/${{ inputs.output_dir || 'data' }}
          retention-days: 7
