name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-lint-test:
    name: pnpm lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm biome check apps/api packages/db packages/types apps/web/lib
      - run: pnpm turbo typecheck --concurrency=4
      - run: pnpm turbo test --concurrency=4

  py-lint-test:
    name: uv ruff + pytest (apps/wrapper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wrapper
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pytest
