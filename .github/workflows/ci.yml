name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ts-lint-test:
    name: pnpm lint + typecheck + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      ## v1 (apps/web) is on its own legacy lint; v2 surface is checked strictly.
      - run: pnpm biome check apps/api packages/db packages/types apps/web/lib/api.ts apps/web/lib/metricsLoader.ts
      - run: pnpm turbo typecheck --concurrency=4
      - run: pnpm turbo test --concurrency=4

  py-lint-test:
    name: uv ruff + pytest (apps/wrapper)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/wrapper
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync --frozen
      ## v2 surface only (legacy scripts/{pipeline,download,frontend} are
      ## checked on best-effort and excluded from blocking CI until rewritten).
      - run: |
          uv run ruff check \
            src/edinet_wrapper/metrics.py \
            src/edinet_wrapper/db.py \
            scripts/ingest_daily.py \
            scripts/publish_to_d1.py \
            scripts/backfill.py \
            tests/
      - run: |
          uv run ruff format --check \
            src/edinet_wrapper/metrics.py \
            src/edinet_wrapper/db.py \
            scripts/ingest_daily.py \
            scripts/publish_to_d1.py \
            scripts/backfill.py \
            tests/
      - run: uv run pytest
