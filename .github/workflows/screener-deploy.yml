name: Screener deploy

on:
  workflow_dispatch:
    inputs:
      dataset_tier:
        description: "sample or prod"
        required: true
        default: "sample"
        type: choice
        options:
          - sample
          - prod
      dataset_version:
        description: "YYYY-MM-DD, empty uses latest"
        required: false
        type: string
      object_prefix:
        description: "R2 object prefix"
        required: false
        default: "datasets"
        type: string
  push:
    branches:
      - main
    paths:
      - "edinet-screener/**"
      - ".github/workflows/screener-deploy.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: edinet-screener
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: edinet-screener/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download dataset archive from R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_BUCKET: ${{ secrets.CLOUDFLARE_R2_BUCKET }}
          DATASET_TIER: ${{ github.event_name == 'workflow_dispatch' && inputs.dataset_tier || 'prod' }}
          DATASET_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.dataset_version || '' }}
          OBJECT_PREFIX: ${{ github.event_name == 'workflow_dispatch' && inputs.object_prefix || 'datasets' }}
          PUBLIC_DATA_ARCHIVE: ${{ github.workspace }}/public-data.tar.gz
        run: |
          set -euo pipefail
          if [ -n "$DATASET_VERSION" ]; then
            key="${OBJECT_PREFIX}/${DATASET_TIER}/${DATASET_VERSION}/public-data.tar.gz"
          else
            key="${OBJECT_PREFIX}/${DATASET_TIER}/latest/public-data.tar.gz"
          fi
          npx wrangler r2 object get "${R2_BUCKET}/${key}" --file "$PUBLIC_DATA_ARCHIVE"

      - name: Restore public data
        env:
          PUBLIC_DATA_ARCHIVE: ${{ github.workspace }}/public-data.tar.gz
        run: npm run restore:data

      - name: Build app
        run: npm run build:app

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
