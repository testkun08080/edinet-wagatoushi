## Smoke-test the production-ready images locally before pushing to Workers.
## Build contexts are the repo root so the multi-stage Dockerfiles can
## copy the workspace lockfile and packages/* into their builder layer.

services:
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      target: production
    environment:
      - NODE_ENV=production
    ports:
      - "8787:8787"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      target: production
    depends_on:
      - api
    environment:
      - PUBLIC_ENV__API_URL=http://api:8787
      - NODE_ENV=production
    ports:
      - "3000:3000"
